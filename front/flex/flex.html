<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Title</title>
    <style>
        .wrap {
            background-color: gainsboro;
            width: 700px;
            height: 500px;
            justify-content: space-between;
        }
        .left-side {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .left-side div{
            color:white;
            line-height:100px;
            text-align: center;
            font-size:40px;
            width:100px;
            height:100px;
}




        .blue {
            background-color: #4967d8;
        }

        .pink {
            background-color: #ea8676;
        }

        .yellow {
            background-color: #fad84a;
        }
    </style>
</head>

<body>
    <div class="wrap">
        <div class="left-side">
            <div class="blue">A</div>
            <div class="pink">B</div>
            <div class="yellow">C</div>
       
   
    </div>
</body>

</html>
