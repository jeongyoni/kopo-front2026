<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class='box'></div>
    <input class ='btn_clear' typ= 'button' value ='clear'>
    <div class ='result'></div>
    <script>
        const div =document.querySelector('.box');
        const btnClear = document.querySelector('.btn_clear');
        const result = document.querySelector('.result');
        div.addEventListener('click',(event)=>{
            result.innerHTML +='<div>click</div>';
        });
        btnClear.addEventListener('mousedown',(event)=>{
            result.innerHTML +='<div>mousedown</div>';
        });
        div.addEventListener('mouseup',(event)=>{
            result.innerHTML +='<div>mouseup</div>';
        });
        btnClear.addEventListener('click',(event)=>{
            result.innerHTML +='';
        });
    </script>
    <style>
        .box{
            width: 200px;
            height: 200px;
            background-color: rgb(245, 159, 231);
        }
    </style>
</body>
</html>--
